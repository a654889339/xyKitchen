<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>xyKitchen · 预订</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fdf5e6; min-height: 100vh; padding-top: 52px; }
    .top-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      padding: 10px 14px; background: #a32626; color: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,.12);
    }
    .top-brand { font-weight: 800; font-size: 1.1rem; letter-spacing: 0.5px; }
    .top-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .top-actions button {
      padding: 8px 14px; font-size: 0.85rem; border: none; border-radius: 999px;
      background: #fff; color: #a32626; font-weight: 600; cursor: pointer;
    }
    .view { display: none; padding: 16px; padding-bottom: 100px; max-width: 480px; margin: 0 auto; }
    .view.active { display: block; }
    .frame {
      min-height: calc(100vh - 32px);
      border: 8px solid #a32626;
      border-radius: 8px;
      padding: 24px 16px 48px;
      background-color: #fdf5e6;
      background-size: cover;
      background-position: center;
    }
    .ribbon { background: #a32626; color: #fff; text-align: center; padding: 8px 16px; border-radius: 6px; margin-bottom: 24px; letter-spacing: 2px; }
    .shop-title { color: #a32626; font-size: 1.5rem; font-weight: 800; text-align: center; margin-bottom: 48px; }
    .btn { width: 100%; max-width: 320px; margin: 12px auto; display: block; padding: 14px; border: none; border-radius: 999px; background: #a32626; color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-outline { background: transparent; color: #a32626; border: 2px solid #a32626; }
    h2 { color: #a32626; font-size: 1.25rem; margin-bottom: 12px; }
    .notice-body { white-space: pre-wrap; line-height: 1.7; border: 1px solid #d4a59a; border-radius: 8px; padding: 16px; background: rgba(255,255,255,.5); min-height: 200px; }
    .month-row { display: flex; align-items: center; justify-content: center; gap: 24px; margin: 12px 0; color: #a32626; font-weight: 700; }
    .month-nav { cursor: pointer; padding: 4px 12px; font-size: 1.4rem; }
    .week-row { display: flex; margin-bottom: 6px; }
    .week-row span { flex: 1; text-align: center; font-size: 0.75rem; color: #a32626; }
    .cal-grid { display: flex; flex-wrap: wrap; }
    .cal-cell { width: 14.28%; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; cursor: pointer; }
    .cal-cell.muted { color: #d8c8c8; cursor: default; }
    .cal-cell.picked { background: #a32626; color: #fff; border-radius: 8px; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .chip { padding: 8px 16px; border: 2px solid #a32626; color: #a32626; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
    .chip.on { background: #a32626; color: #fff; }
    .footer { position: fixed; left: 0; right: 0; bottom: 0; background: #fff9e3; padding: 12px 16px; border-top: 1px solid #e8dcc8; max-width: 480px; margin: 0 auto; }
    .price-line { display: flex; align-items: baseline; gap: 6px; margin-bottom: 8px; }
    .price-num { font-size: 1.75rem; font-weight: 800; color: #a32626; }
    input.tel { width: 100%; padding: 10px; margin-bottom: 8px; border: 1px solid #d4a59a; border-radius: 6px; }
    .card { background: #fff; border: 1px solid #e8dcc8; border-radius: 12px; padding: 12px; margin-bottom: 12px; font-size: 0.9rem; }
    .row { display: flex; justify-content: space-between; gap: 8px; padding: 4px 0; }
    .muted { color: #888; }
    .login-box { margin-top: 16px; padding: 12px; border: 1px dashed #ccc; border-radius: 8px; font-size: 0.85rem; }
    .login-box input { width: 100%; margin: 6px 0; padding: 8px; }
  </style>
</head>
<body>
  <header class="top-bar">
    <span class="top-brand">xyKitchen</span>
    <div class="top-actions">
      <button type="button" id="btnTopStart">开始预订</button>
      <button type="button" id="btnTopMine">我的预订</button>
    </div>
  </header>
  <div id="home" class="view active">
    <div id="homeFrame" class="frame">
      <div class="ribbon">正宗四川爆炒</div>
      <div class="shop-title">niao 炒菜店 niao</div>
      <button type="button" class="btn" id="btnStart">开始预订</button>
      <button type="button" class="btn" id="btnMine">我的预订</button>
    </div>
  </div>

  <div id="notice" class="view">
    <h2 id="noticeTitle">預定須知</h2>
    <div id="noticeBody" class="notice-body"></div>
    <button type="button" class="btn" id="btnNoticeNext">下一步</button>
    <button type="button" class="btn btn-outline" id="btnBackFromNotice">返回</button>
  </div>

  <div id="book" class="view">
    <h2>預定日期</h2>
    <div class="month-row">
      <span class="month-nav" id="mPrev">‹</span>
      <span id="mLabel"></span>
      <span class="month-nav" id="mNext">›</span>
    </div>
    <div class="week-row"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>
    <div id="calGrid" class="cal-grid"></div>
    <div id="slotSection" style="display:none">
      <h2 style="margin-top:16px">可用餐時間</h2>
      <div id="slotChips" class="chips"></div>
    </div>
    <div id="guestSection" style="display:none">
      <h2 style="margin-top:16px">用餐人数</h2>
      <div id="guestChips" class="chips"></div>
    </div>
    <button type="button" class="btn btn-outline" id="btnBackBook">返回</button>
  </div>

  <div id="orders" class="view">
    <h2>我的预订</h2>
    <div id="ordersLogin" class="login-box" style="display:none">
      <p>登录后可查看订单（与后台用户体系一致）</p>
      <input type="text" id="loginUser" placeholder="用户名" autocomplete="username" />
      <input type="password" id="loginPass" placeholder="密码" autocomplete="current-password" />
      <button type="button" class="btn" id="btnDoLogin">登录</button>
    </div>
    <div id="ordersList"></div>
    <button type="button" class="btn btn-outline" id="btnBackOrders">返回首页</button>
  </div>

  <div id="footBar" class="footer" style="display:none">
    <div class="price-line"><span style="color:#a32626">¥</span><span class="price-num" id="depAmt">0</span><span class="muted">订金</span></div>
    <input type="tel" class="tel" id="phoneInp" maxlength="11" placeholder="11位手机号" />
    <button type="button" class="btn" id="btnConfirmBook">确认预定</button>
  </div>

  <script>
    const API = (window.XYKITCHEN_API || ('http://' + location.hostname + ':5402/api')).replace(/\/$/, '');
    let token = localStorage.getItem('xykitchen_token') || '';
    let viewYear, viewMonth, selectedDay, selectedDate = '', selectedSlot = '', guestCount = 0;
    let meta = { timeSlots: ['17:00','19:00','21:00'], guestOptions: [2,3,4,6], perPersonDeposit: 50 };

    function show(id) {
      document.querySelectorAll('.view').forEach((el) => el.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      document.getElementById('footBar').style.display = id === 'book' && guestCount ? 'block' : 'none';
    }

    async function api(path, opt) {
      const headers = { 'Content-Type': 'application/json' };
      if (token) headers['Authorization'] = 'Bearer ' + token;
      const res = await fetch(API + path, {
        method: opt && opt.method || 'GET',
        headers,
        body: opt && opt.body ? JSON.stringify(opt.body) : undefined,
      });
      const data = await res.json().catch(() => ({}));
      if (data.code !== 0) throw new Error(data.message || '请求失败');
      return data;
    }

    async function loadBookingConfig() {
      try {
        const { data } = await api('/booking-config');
        const u = data.homepageBgUrl || '';
        if (u) {
          const base = API.replace(/\/api$/, '');
          let full = /^https?:/i.test(u) ? u : base + (u.startsWith('/') ? u : '/' + u);
          if (full.startsWith('/')) {
            full = (location.protocol + '//' + location.host) + full;
          }
          document.getElementById('homeFrame').style.backgroundImage = 'url(' + JSON.stringify(full) + ')';
        }
      } catch (e) {
        console.warn('booking-config', e);
      }
    }

    function goStart() {
      document.getElementById('btnStart').click();
    }
    function goMine() {
      document.getElementById('btnMine').click();
    }
    document.getElementById('btnTopStart').onclick = function () { goStart(); };
    document.getElementById('btnTopMine').onclick = function () { goMine(); };

    document.getElementById('btnStart').onclick = async () => {
      const { data } = await api('/booking-config');
      document.getElementById('noticeTitle').textContent = data.noticeTitle || '預定須知';
      document.getElementById('noticeBody').textContent = data.noticeBody || '';
      show('notice');
    };
    document.getElementById('btnNoticeNext').onclick = () => { openBooking(); };
    document.getElementById('btnBackFromNotice').onclick = () => show('home');

    async function openBooking() {
      show('book');
      const now = new Date();
      viewYear = now.getFullYear();
      viewMonth = now.getMonth() + 1;
      const r = await api('/booking/meta');
      meta = Object.assign(meta, r.data || {});
      selectedDay = 0; selectedDate = ''; selectedSlot = ''; guestCount = 0;
      document.getElementById('slotSection').style.display = 'none';
      document.getElementById('guestSection').style.display = 'none';
      document.getElementById('footBar').style.display = 'none';
      await renderCal();
    }

    function pad(n) { return n < 10 ? '0' + n : '' + n; }

    async function renderCal() {
      document.getElementById('mLabel').textContent = viewMonth + '月';
      const { data } = await api('/booking/calendar?year=' + viewYear + '&month=' + viewMonth);
      const days = data.days || [];
      const year = data.year || viewYear;
      const month = data.month || viewMonth;
      viewYear = year; viewMonth = month;
      const first = new Date(year, month - 1, 1);
      const lastDate = new Date(year, month, 0).getDate();
      const startWd = first.getDay();
      const grid = document.getElementById('calGrid');
      grid.innerHTML = '';
      for (let i = 0; i < startWd; i++) {
        const c = document.createElement('div'); c.className = 'cal-cell muted'; grid.appendChild(c);
      }
      for (let day = 1; day <= lastDate; day++) {
        const ok = days.indexOf(day) >= 0;
        const c = document.createElement('div');
        c.className = 'cal-cell' + (ok ? '' : ' muted') + (day === selectedDay ? ' picked' : '');
        c.textContent = day;
        if (ok) {
          c.onclick = () => {
            selectedDay = day;
            selectedDate = year + '-' + pad(month) + '-' + pad(day);
            selectedSlot = ''; guestCount = 0;
            renderCal();
            renderSlots();
            document.getElementById('slotSection').style.display = 'block';
            document.getElementById('guestSection').style.display = 'none';
            document.getElementById('footBar').style.display = 'none';
          };
        }
        grid.appendChild(c);
      }
    }

    function renderSlots() {
      const slotChips = document.getElementById('slotChips');
      slotChips.innerHTML = '';
      (meta.timeSlots || []).forEach((s) => {
        const b = document.createElement('button');
        b.type = 'button'; b.className = 'chip' + (selectedSlot === s ? ' on' : '');
        b.textContent = s;
        b.onclick = () => {
          selectedSlot = s;
          guestCount = 0;
          renderSlots();
          renderGuests();
          document.getElementById('guestSection').style.display = 'block';
          document.getElementById('footBar').style.display = guestCount ? 'block' : 'none';
        };
        slotChips.appendChild(b);
      });
    }

    function renderGuests() {
      const guestChips = document.getElementById('guestChips');
      guestChips.innerHTML = '';
      (meta.guestOptions || []).forEach((n) => {
        const b = document.createElement('button');
        b.type = 'button'; b.className = 'chip' + (guestCount === n ? ' on' : '');
        b.textContent = n;
        b.onclick = () => {
          guestCount = n;
          renderGuests();
          const total = meta.perPersonDeposit * guestCount;
          document.getElementById('depAmt').textContent = Number.isInteger(total) ? String(total) : total.toFixed(2);
          document.getElementById('footBar').style.display = 'block';
          show('book');
        };
        guestChips.appendChild(b);
      });
    }

    document.getElementById('mPrev').onclick = async () => {
      viewMonth--;
      if (viewMonth < 1) { viewMonth = 12; viewYear--; }
      selectedDay = 0; selectedDate = ''; selectedSlot = ''; guestCount = 0;
      await renderCal();
    };
    document.getElementById('mNext').onclick = async () => {
      viewMonth++;
      if (viewMonth > 12) { viewMonth = 1; viewYear++; }
      selectedDay = 0; selectedDate = ''; selectedSlot = ''; guestCount = 0;
      await renderCal();
    };

    document.getElementById('btnConfirmBook').onclick = async () => {
      const phone = (document.getElementById('phoneInp').value || '').replace(/\D/g, '');
      if (!selectedDate || !selectedSlot || !guestCount) { alert('请选择完整预订信息'); return; }
      if (!/^1[3-9]\d{9}$/.test(phone)) { alert('请输入11位手机号'); return; }
      const price = meta.perPersonDeposit * guestCount;
      try {
        if (!token) {
          alert('请先登录（将跳转登录区域）');
          document.getElementById('ordersLogin').style.display = 'block';
          return;
        }
        await api('/orders', {
          method: 'POST',
          body: {
            bookingDate: selectedDate,
            timeSlot: selectedSlot,
            guestCount,
            contactPhone: phone,
            price,
          },
        });
        alert('预订已提交');
        location.hash = '';
        show('home');
      } catch (e) {
        alert(e.message || '失败');
      }
    };

    document.getElementById('btnMine').onclick = async () => {
      if (!token) {
        document.getElementById('ordersLogin').style.display = 'block';
      } else {
        document.getElementById('ordersLogin').style.display = 'none';
      }
      await loadOrders();
      show('orders');
    };

    document.getElementById('btnDoLogin').onclick = async () => {
      const u = document.getElementById('loginUser').value.trim();
      const p = document.getElementById('loginPass').value;
      try {
        const r = await fetch(API + '/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: u, password: p }),
        });
        const j = await r.json();
        if (j.code !== 0) throw new Error(j.message || '登录失败');
        token = j.data.token;
        localStorage.setItem('xykitchen_token', token);
        document.getElementById('ordersLogin').style.display = 'none';
        await loadOrders();
      } catch (e) {
        alert(e.message || '登录失败');
      }
    };

    async function loadOrders() {
      const wrap = document.getElementById('ordersList');
      if (!token) {
        wrap.innerHTML = '<p class="muted">登录后显示订单</p>';
        return;
      }
      try {
        const { data } = await api('/orders/mine?pageSize=50');
        const list = data.list || [];
        if (!list.length) {
          wrap.innerHTML = '<p class="muted">暂无订单</p>';
          return;
        }
        wrap.innerHTML = list.map((o) => {
          const bt = o.bookingAt ? new Date(o.bookingAt).toLocaleString('zh-CN') : '-';
          return '<div class="card"><div class="row"><span class="muted">订单号</span><span>' + o.orderNo + '</span></div>' +
            '<div class="row"><span class="muted">预订时间</span><span>' + bt + '</span></div>' +
            '<div class="row"><span class="muted">人数</span><span>' + (o.guestCount || '') + '</span></div>' +
            '<div class="row"><span class="muted">手机</span><span>' + (o.contactPhone || '') + '</span></div>' +
            '<div class="row"><span class="muted">金额</span><span>' + (o.price != null ? o.price : '') + '</span></div>' +
            '<div class="row"><span class="muted">状态</span><span>' + (o.statusText || o.status) + '</span></div></div>';
        }).join('');
      } catch (e) {
        wrap.innerHTML = '<p class="muted">' + (e.message || '加载失败') + '</p>';
      }
    }

    document.getElementById('btnBackBook').onclick = () => show('notice');
    document.getElementById('btnBackOrders').onclick = () => show('home');

    loadBookingConfig().catch(function () {});
  </script>
</body>
</html>
